<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>小手机</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

:root {
  --bg: #f5f0eb;
  --white: #ffffff;
  --pink: #f9c8c8;
  --pink2: #f4a8a8;
  --yellow: #fde9b8;
  --yellow2: #f8d480;
  --mint: #c2e8d8;
  --mint2: #8ed4b8;
  --lavender: #d4cff0;
  --lavender2: #b0a8e0;
  --blue: #c8def8;
  --text: #3a3040;
  --text2: #8a7a8a;
  --shadow: rgba(180,160,180,0.18);
  --radius: 28px;
}

body {
  background: var(--bg);
  min-height: 100vh;
  font-family: 'Zen Maru Gothic', 'Noto Sans SC', sans-serif;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  height: 100vh;
}

/* 顶部对话气泡 */
.top-bubble-area {
  padding: 18px 20px 10px;
  display: flex;
  align-items: flex-start;
  gap: 12px;
  flex-shrink: 0;
}
.avatar-circle {
  width: 52px; height: 52px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--pink), var(--lavender));
  flex-shrink: 0;
  box-shadow: 0 4px 12px var(--shadow);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 24px;
}
.speech-bubble {
  background: var(--white);
  border-radius: 0 20px 20px 20px;
  padding: 14px 18px;
  font-size: 15px;
  color: var(--text);
  line-height: 1.6;
  box-shadow: 0 4px 16px var(--shadow);
  flex: 1;
  position: relative;
  min-height: 52px;
  display: flex;
  align-items: center;
}
.speech-bubble::before {
  content: '';
  position: absolute;
  left: -10px; top: 14px;
  border: 6px solid transparent;
  border-right-color: var(--white);
  border-left: none;
}

/* 主内容区 */
.main-content {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  padding: 8px 16px 16px;
}
.main-content::-webkit-scrollbar { display: none; }

/* 页面 */
.page { display: none; }
.page.active { display: block; }

/* 应用网格 */
.app-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 14px;
  padding: 8px 0;
}
.app-btn {
  background: var(--white);
  border-radius: 22px;
  padding: 18px 10px 14px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  cursor: pointer;
  box-shadow: 0 4px 14px var(--shadow);
  transition: transform 0.18s, box-shadow 0.18s;
  border: none;
  font-family: inherit;
}
.app-btn:active { transform: scale(0.93); box-shadow: 0 2px 8px var(--shadow); }
.app-icon-wrap {
  width: 52px; height: 52px;
  border-radius: 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 26px;
}
.app-label {
  font-size: 12px;
  color: var(--text2);
  font-weight: 500;
}

/* 胶囊按钮 */
.capsule-btn {
  display: flex;
  align-items: center;
  gap: 10px;
  background: var(--white);
  border-radius: 50px;
  padding: 14px 20px;
  margin-bottom: 12px;
  cursor: pointer;
  box-shadow: 0 4px 14px var(--shadow);
  border: none;
  font-family: inherit;
  width: 100%;
  transition: transform 0.18s;
}
.capsule-btn:active { transform: scale(0.97); }
.capsule-icon {
  width: 38px; height: 38px;
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  flex-shrink: 0;
}
.capsule-text { flex: 1; text-align: left; }
.capsule-title { font-size: 15px; color: var(--text); font-weight: 500; }
.capsule-sub { font-size: 12px; color: var(--text2); margin-top: 1px; }
.capsule-arrow { color: var(--text2); font-size: 18px; }

/* 聊天页面 */
.chat-messages {
  display: flex;
  flex-direction: column;
  gap: 14px;
  padding: 8px 0 16px;
}
.msg-row { display: flex; gap: 8px; align-items: flex-end; }
.msg-row.me { flex-direction: row-reverse; }
.msg-av {
  width: 34px; height: 34px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px;
  flex-shrink: 0;
}
.msg-av.ai { background: linear-gradient(135deg, var(--pink), var(--lavender)); }
.msg-av.user { background: linear-gradient(135deg, var(--mint), var(--blue)); }
.msg-bubble {
  max-width: 220px;
  padding: 11px 15px;
  font-size: 14px;
  line-height: 1.6;
  color: var(--text);
  word-break: break-word;
}
.msg-bubble.ai {
  background: var(--white);
  border-radius: 4px 18px 18px 18px;
  box-shadow: 0 3px 10px var(--shadow);
}
.msg-bubble.user {
  background: linear-gradient(135deg, var(--yellow), var(--yellow2));
  border-radius: 18px 18px 4px 18px;
  box-shadow: 0 3px 10px var(--shadow);
}
.msg-bubble.loading { opacity: 0.7; }
.dots span {
  display: inline-block;
  animation: blink 1.2s infinite;
  font-size: 18px;
}
.dots span:nth-child(2) { animation-delay:.2s }
.dots span:nth-child(3) { animation-delay:.4s }
@keyframes blink {
  0%,60%,100% { opacity:.2; transform:translateY(0) }
  30% { opacity:1; transform:translateY(-3px) }
}

/* 输入区 */
.input-bar {
  padding: 10px 16px 20px;
  display: flex;
  gap: 10px;
  align-items: flex-end;
  flex-shrink: 0;
  background: var(--bg);
}
.chat-input {
  flex: 1;
  background: var(--white);
  border: none;
  border-radius: 22px;
  padding: 12px 16px;
  font-size: 14px;
  font-family: inherit;
  color: var(--text);
  resize: none;
  outline: none;
  max-height: 90px;
  box-shadow: 0 3px 10px var(--shadow);
  line-height: 1.4;
}
.chat-input::placeholder { color: var(--text2); }
.send-btn {
  width: 44px; height: 44px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--pink2), var(--lavender2));
  border: none;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  box-shadow: 0 3px 10px var(--shadow);
  transition: transform .15s;
  font-size: 18px;
}
.send-btn:active { transform: scale(0.9); }
.send-btn:disabled { opacity: 0.5; }

/* 设置页 */
.settings-section { margin-bottom: 20px; }
.section-title {
  font-size: 12px;
  color: var(--text2);
  padding: 0 4px;
  margin-bottom: 8px;
  letter-spacing: 0.5px;
}

/* 弹窗 */
.overlay {
  position: fixed;
  inset: 0;
  background: rgba(60,40,60,0.25);
  backdrop-filter: blur(6px);
  z-index: 100;
  display: flex;
  align-items: flex-end;
  opacity: 0;
  pointer-events: none;
  transition: opacity .3s;
}
.overlay.show { opacity: 1; pointer-events: all; }
.sheet {
  width: 100%;
  background: var(--white);
  border-radius: 28px 28px 0 0;
  padding: 20px 20px 36px;
  transform: translateY(100%);
  transition: transform .35s cubic-bezier(.34,1.56,.64,1);
  max-height: 85vh;
  overflow-y: auto;
}
.overlay.show .sheet { transform: translateY(0); }
.sheet-handle {
  width: 36px; height: 4px;
  background: #e0d8e0;
  border-radius: 2px;
  margin: 0 auto 20px;
}
.sheet-title { font-size: 20px; font-weight: 700; color: var(--text); margin-bottom: 6px; }
.sheet-sub { font-size: 13px; color: var(--text2); margin-bottom: 18px; line-height: 1.5; }

.field-label { font-size: 12px; color: var(--text2); margin-bottom: 5px; }
.field-input {
  width: 100%;
  background: var(--bg);
  border: 1.5px solid transparent;
  border-radius: 14px;
  padding: 13px 15px;
  font-size: 14px;
  font-family: inherit;
  color: var(--text);
  outline: none;
  margin-bottom: 14px;
  transition: border-color .2s;
}
.field-input:focus { border-color: var(--pink2); }
.field-input::placeholder { color: var(--text2); }

.btn-row { display: flex; gap: 10px; margin-top: 4px; }
.btn {
  flex: 1;
  padding: 14px;
  border-radius: 18px;
  border: none;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  font-family: inherit;
  transition: transform .15s;
}
.btn:active { transform: scale(.97); }
.btn-ghost { background: var(--bg); color: var(--text2); }
.btn-primary { background: linear-gradient(135deg, var(--pink2), var(--lavender2)); color: white; }
.btn-full { width: 100%; margin-bottom: 10px; }

.fetch-btn {
  width: 100%;
  padding: 13px;
  border-radius: 18px;
  border: none;
  background: linear-gradient(135deg, var(--mint), var(--mint2));
  color: var(--text);
  font-size: 14px;
  font-weight: 600;
  font-family: inherit;
  cursor: pointer;
  margin-bottom: 14px;
  transition: transform .15s;
}
.fetch-btn:active { transform: scale(.97); }

.model-list { display: none; margin-bottom: 14px; }
.model-list.show { display: block; }
.model-item {
  display: flex;
  align-items: center;
  padding: 13px 16px;
  border-radius: 14px;
  margin-bottom: 6px;
  background: var(--bg);
  cursor: pointer;
  transition: background .15s;
  gap: 10px;
}
.model-item:active { background: var(--yellow); }
.model-item.selected { background: var(--yellow); }
.model-name { flex: 1; font-size: 14px; color: var(--text); }
.model-check { color: var(--pink2); font-size: 18px; font-weight: 700; }

/* 底部导航 */
.bottom-nav {
  display: flex;
  justify-content: space-around;
  padding: 10px 0 24px;
  background: var(--white);
  border-radius: 28px 28px 0 0;
  box-shadow: 0 -4px 20px var(--shadow);
  flex-shrink: 0;
}
.nav-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  cursor: pointer;
  padding: 6px 20px;
  border-radius: 16px;
  transition: background .15s;
  border: none;
  background: none;
  font-family: inherit;
}
.nav-item.active { background: var(--yellow); }
.nav-icon { font-size: 22px; line-height: 1; }
.nav-label { font-size: 10px; color: var(--text2); }
.nav-item.active .nav-label { color: var(--text); font-weight: 600; }

/* 动画 */
@keyframes fadeUp {
  from { opacity:0; transform:translateY(12px); }
  to { opacity:1; transform:translateY(0); }
}
.app-btn, .capsule-btn { animation: fadeUp .4s ease both; }
</style>
</head>
<body>

<!-- 顶部对话气泡 -->
<div class="top-bubble-area">
  <div class="avatar-circle" id="topAvatar" style="overflow:hidden;padding:0"><img src="https://i.imgur.com/placeholder.png" id="userAvatarImg" style="width:100%;height:100%;object-fit:cover;border-radius:50%;display:none"><span id="userAvatarEmoji" style="font-size:24px">🌸</span></div>
  <div class="speech-bubble" id="topBubble">嘿，找我有事？</div>
</div>

<!-- 主内容 -->
<div class="main-content" id="mainContent">

  <!-- 主页 -->
  <div class="page active" id="page-home">
    <div class="app-grid">
      <button class="app-btn" onclick="goPage('chat')" style="animation-delay:.05s">
        <div class="app-icon-wrap" style="background:linear-gradient(135deg,#fde9b8,#f8d480)">💬</div>
        <span class="app-label">对话</span>
      </button>
      <button class="app-btn" onclick="goPage('settings')" style="animation-delay:.1s">
        <div class="app-icon-wrap" style="background:linear-gradient(135deg,#d4cff0,#b0a8e0)">⚙️</div>
        <span class="app-label">设置</span>
      </button>
      <button class="app-btn" onclick="setBubble('今天天气不错，出去转转？')" style="animation-delay:.15s">
        <div class="app-icon-wrap" style="background:linear-gradient(135deg,#c2e8d8,#8ed4b8)">🌿</div>
        <span class="app-label">心情</span>
      </button>
      <button class="app-btn" onclick="setBubble('你还在啊。')" style="animation-delay:.2s">
        <div class="app-icon-wrap" style="background:linear-gradient(135deg,#c8def8,#90bff0)">💧</div>
        <span class="app-label">提醒</span>
      </button>
      <button class="app-btn" onclick="setBubble('说吧，我有空。')" style="animation-delay:.25s">
        <div class="app-icon-wrap" style="background:linear-gradient(135deg,#f9c8c8,#f4a8a8)">🎵</div>
        <span class="app-label">倾听</span>
      </button>
      <button class="app-btn" onclick="setBubble('今天怎么样？')" style="animation-delay:.3s">
        <div class="app-icon-wrap" style="background:linear-gradient(135deg,#fde9b8,#f9c8c8)">✨</div>
        <span class="app-label">日记</span>
      </button>
    </div>
  </div>

  <!-- 聊天页 -->
  <div class="page" id="page-chat">
    <div style="display:flex;align-items:center;gap:8px;padding:8px 0 12px">
      <button onclick="goPage('home')" style="background:none;border:none;font-size:15px;color:#b0a8e0;cursor:pointer;font-family:inherit;padding:6px 10px 6px 0">‹ 返回</button>
      <span style="font-size:15px;font-weight:600;color:#3a3040">凌栎</span>
    </div>
    <div class="chat-messages" id="chatMessages">
      <div class="msg-row">
        <div class="msg-av ai" style="background-image:url(https://i.imgur.com/YKMdUhJ.png);background-size:cover;background-position:center"></div>
        <div class="msg-bubble ai">设置里把API Key填上，填完来找我。</div>
      </div>
    </div>
  </div>

  <!-- 设置页 -->
  <div class="page" id="page-settings">
    <div style="display:flex;align-items:center;gap:8px;padding:8px 0 12px">
      <button onclick="goPage('home')" style="background:none;border:none;font-size:15px;color:#b0a8e0;cursor:pointer;font-family:inherit;padding:6px 10px 6px 0">‹ 返回</button>
      <span style="font-size:15px;font-weight:600;color:#3a3040">设置</span>
    </div>
    <div class="settings-section">
      <div class="section-title">API 连接</div>
      <button class="capsule-btn" onclick="openSheet('api')">
        <div class="capsule-icon" style="background:linear-gradient(135deg,var(--yellow),var(--yellow2))">🔑</div>
        <div class="capsule-text">
          <div class="capsule-title">API 设置</div>
          <div class="capsule-sub" id="apiStatusText">未设置</div>
        </div>
        <span class="capsule-arrow">›</span>
      </button>
      <button class="capsule-btn" onclick="openSheet('model')">
        <div class="capsule-icon" style="background:linear-gradient(135deg,var(--lavender),var(--lavender2))">🧠</div>
        <div class="capsule-text">
          <div class="capsule-title">当前模型</div>
          <div class="capsule-sub" id="modelStatusText">未选择</div>
        </div>
        <span class="capsule-arrow">›</span>
      </button>
    </div>
    <div class="settings-section">
      <div class="section-title">聊天设置</div>
      <button class="capsule-btn" onclick="openSheet('system')">
        <div class="capsule-icon" style="background:linear-gradient(135deg,var(--mint),var(--mint2))">📝</div>
        <div class="capsule-text">
          <div class="capsule-title">系统提示词</div>
          <div class="capsule-sub" id="systemStatusText">默认</div>
        </div>
        <span class="capsule-arrow">›</span>
      </button>
      <button class="capsule-btn" onclick="clearChat()">
        <div class="capsule-icon" style="background:linear-gradient(135deg,#ffd0d0,#ffb0b0)">🗑️</div>
        <div class="capsule-text">
          <div class="capsule-title">清除聊天记录</div>
        </div>
        <span class="capsule-arrow">›</span>
      </button>
    </div>
  </div>

</div>

<!-- 聊天输入框（只在聊天页显示） -->
<div class="input-bar" id="inputBar" style="display:none">
  <textarea class="chat-input" id="chatInput" placeholder="说点什么…" rows="1" onkeydown="handleKey(event)"></textarea>
  <button class="send-btn" id="sendBtn" onclick="sendMsg()">➤</button>
</div>

<!-- 底部导航 -->
<div class="bottom-nav">
  <button class="nav-item active" id="nav-home" onclick="goPage('home')">
    <span class="nav-icon">🏠</span>
    <span class="nav-label">主页</span>
  </button>
  <button class="nav-item" id="nav-chat" onclick="goPage('chat')">
    <span class="nav-icon">💬</span>
    <span class="nav-label">对话</span>
  </button>
  <button class="nav-item" id="nav-settings" onclick="goPage('settings')">
    <span class="nav-icon">⚙️</span>
    <span class="nav-label">设置</span>
  </button>
</div>

<!-- API设置弹窗 -->
<div class="overlay" id="sheet-api" onclick="sheetBg(event,'api')">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title">🔑 API 设置</div>
    <div class="sheet-sub">填入地址和密钥，点击拉取模型列表</div>
    <div class="field-label">API 地址</div>
    <input class="field-input" id="urlInput" placeholder="https://api.68886868.xyz/v1"/>
    <div class="field-label">API 密钥</div>
    <input class="field-input" id="keyInput" placeholder="sk-..." type="password"/>
    <button class="fetch-btn" onclick="fetchModels()">
      <span id="fetchText">🔄 拉取模型列表</span>
    </button>
    <div class="model-list" id="modelListBox"></div>
    <div class="btn-row">
      <button class="btn btn-ghost" onclick="closeSheet('api')">取消</button>
      <button class="btn btn-primary" onclick="saveApi()">保存</button>
    </div>
  </div>
</div>

<!-- 模型弹窗 -->
<div class="overlay" id="sheet-model" onclick="sheetBg(event,'model')">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title">🧠 选择模型</div>
    <div class="sheet-sub">当前已选：<span id="currentModelDisplay">未选择</span></div>
    <button class="fetch-btn" onclick="closeSheet('model');openSheet('api')">去API设置里拉取模型</button>
    <button class="btn btn-ghost btn-full" onclick="closeSheet('model')">关闭</button>
  </div>
</div>

<!-- 系统提示词弹窗 -->
<div class="overlay" id="sheet-system" onclick="sheetBg(event,'system')">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title">📝 系统提示词</div>
    <div class="sheet-sub">设定AI的性格和说话方式</div>
    <textarea class="field-input" id="systemInput" rows="5" style="resize:none" placeholder="例如：你是一个温柔的朋友，用中文说话，语气轻松自然。"></textarea>
    <div class="btn-row">
      <button class="btn btn-ghost" onclick="closeSheet('system')">取消</button>
      <button class="btn btn-primary" onclick="saveSystem()">保存</button>
    </div>
  </div>
</div>

<script>
let apiUrl = localStorage.getItem('apiUrl') || 'https://api.68886868.xyz/v1';
let apiKey = localStorage.getItem('apiKey') || '';
let model = localStorage.getItem('model') || '';
let systemPrompt = localStorage.getItem('system') || `你正在扮演凌栎。凌栎，22岁，bilibili生活VLOG博主兼Rain俱乐部职业赛车手。187cm，黄毛中分碎发，翠绿色杏仁眼，有小酒窝和虎牙。性格话痨外向、表面好接近但内心防备心强、高攻高防、慕强不服输、极度厌恶谎言和被低估。说话风格：碎碎念、爱吐槽、网络用语自然穿插、轻松随意但有边界感。用第一人称，叫对方"你"，不要过度浪漫化，保持现实都市感。`;
let history = [];
let curPage = 'home';

const bubbles = [
  '嘿，找我有事？',
  '今天过得怎么样？',
  '有什么想聊的吗，我在这里。',
  '慢慢来，不着急。',
];

init();

function init() {
  updateApiStatus();
  updateModelStatus();
  updateSystemStatus();
  randomBubble();
  setInterval(randomBubble, 8000);
}

function randomBubble() {
  if(curPage === 'home') {
    setBubble(bubbles[Math.floor(Math.random()*bubbles.length)]);
  }
}

function setBubble(text) {
  document.getElementById('topBubble').textContent = text;
}

function goPage(name) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-'+name).classList.add('active');
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.getElementById('nav-'+name).classList.add('active');
  document.getElementById('inputBar').style.display = name==='chat' ? 'flex' : 'none';
  curPage = name;

  const bubbleMap = {
    home: '嘿，找我有事？',
    chat: apiKey ? '有什么事直接说。' : '先去设置里填API Key哦 🔑',
    settings: '在这儿捣鼓什么呢。'
  };
  setBubble(bubbleMap[name]);

  if(name==='chat') {
    setTimeout(() => {
      const msgs = document.getElementById('chatMessages');
      msgs.scrollTop = msgs.scrollHeight;
    }, 100);
  }
}

function openSheet(name) {
  if(name==='api') {
    document.getElementById('urlInput').value = apiUrl;
    document.getElementById('keyInput').value = apiKey;
  }
  if(name==='system') {
    document.getElementById('systemInput').value = systemPrompt;
  }
  if(name==='model') {
    document.getElementById('currentModelDisplay').textContent = model || '未选择';
  }
  document.getElementById('sheet-'+name).classList.add('show');
}

function closeSheet(name) {
  document.getElementById('sheet-'+name).classList.remove('show');
}

function sheetBg(e, name) {
  if(e.target === document.getElementById('sheet-'+name)) closeSheet(name);
}

async function fetchModels() {
  const url = document.getElementById('urlInput').value.trim();
  const key = document.getElementById('keyInput').value.trim();
  if(!url||!key) { alert('请先填入地址和密钥'); return; }

  const btn = document.getElementById('fetchText');
  btn.textContent = '⏳ 拉取中...';

  try {
    const base = url.replace(/\/+$/,'');
    const res = await fetch(base+'/models', {
      headers: { 'Authorization':'Bearer '+key, 'x-api-key':key }
    });
    const data = await res.json();
    const models = data.data || data.models || [];
    if(!models.length) { btn.textContent = '❌ 没有获取到模型'; return; }

    const box = document.getElementById('modelListBox');
    box.innerHTML = '';
    models.forEach(m => {
      const id = m.id || m.name || m;
      const item = document.createElement('div');
      item.className = 'model-item' + (id===model?' selected':'');
      item.innerHTML = `<span class="model-name">${id}</span><span class="model-check">${id===model?'✓':''}</span>`;
      item.onclick = () => {
        document.querySelectorAll('.model-item').forEach(el => {
          el.classList.remove('selected');
          el.querySelector('.model-check').textContent = '';
        });
        item.classList.add('selected');
        item.querySelector('.model-check').textContent = '✓';
        model = id;
        localStorage.setItem('model', id);
        updateModelStatus();
      };
      box.appendChild(item);
    });

    box.classList.add('show');
    btn.textContent = '✅ 获取到 '+models.length+' 个模型';
  } catch(e) {
    btn.textContent = '❌ 拉取失败，检查地址和密钥';
  }
}

function saveApi() {
  apiUrl = document.getElementById('urlInput').value.trim() || 'https://api.68886868.xyz/v1';
  apiKey = document.getElementById('keyInput').value.trim();
  localStorage.setItem('apiUrl', apiUrl);
  localStorage.setItem('apiKey', apiKey);
  updateApiStatus();
  closeSheet('api');
}

function saveSystem() {
  systemPrompt = document.getElementById('systemInput').value.trim() || '你是一个温柔体贴的朋友，用中文回复，语气轻松自然，回答简洁。';
  localStorage.setItem('system', systemPrompt);
  updateSystemStatus();
  closeSheet('system');
}

function updateApiStatus() {
  const el = document.getElementById('apiStatusText');
  el.textContent = apiKey ? '✓ 已连接 · ' + apiUrl.replace('https://','').slice(0,20)+'…' : '未设置';
  el.style.color = apiKey ? '#8ed4b8' : '';
}

function updateModelStatus() {
  const el = document.getElementById('modelStatusText');
  el.textContent = model || '未选择';
}

function updateSystemStatus() {
  const el = document.getElementById('systemStatusText');
  el.textContent = systemPrompt.slice(0,16) + (systemPrompt.length>16?'…':'');
}

function clearChat() {
  if(confirm('清除所有聊天记录？')) {
    history = [];
    document.getElementById('chatMessages').innerHTML = `
      <div class="msg-row">
        <div class="msg-av ai" style="background-image:url(https://i.imgur.com/YKMdUhJ.png);background-size:cover;background-position:center"></div>
        <div class="msg-bubble ai">清了。重新来过。</div>
      </div>`;
  }
}

function handleKey(e) {
  if(e.key==='Enter' && !e.shiftKey) { e.preventDefault(); sendMsg(); }
}

function addMsg(text, isMe) {
  const box = document.getElementById('chatMessages');
  const row = document.createElement('div');
  row.className = 'msg-row' + (isMe?' me':'');
  const av = document.createElement('div');
  av.className = 'msg-av ' + (isMe?'user':'ai');
  av.textContent = isMe ? '🙂' : '🌸';
  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble ' + (isMe?'user':'ai');
  bubble.textContent = text;
  row.appendChild(av);
  row.appendChild(bubble);
  box.appendChild(row);
  box.scrollTop = box.scrollHeight;
  return bubble;
}

function addLoading() {
  const box = document.getElementById('chatMessages');
  const row = document.createElement('div');
  row.className = 'msg-row'; row.id = 'loadRow';
  const av = document.createElement('div');
  av.className = 'msg-av ai'; av.style.backgroundImage = 'url(https://i.imgur.com/YKMdUhJ.png)'; av.style.backgroundSize = 'cover'; av.textContent = '';
  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble ai loading';
  bubble.innerHTML = '<div class="dots"><span>•</span><span>•</span><span>•</span></div>';
  row.appendChild(av); row.appendChild(bubble);
  box.appendChild(row);
  box.scrollTop = box.scrollHeight;
}

function removeLoading() {
  const r = document.getElementById('loadRow');
  if(r) r.remove();
}

async function sendMsg() {
  const input = document.getElementById('chatInput');
  const text = input.value.trim();
  if(!text) return;
  if(!apiKey) { addMsg('请先在设置里填入 API Key 哦～', false); return; }
  if(!model) { addMsg('请先在设置里选择模型哦～', false); return; }

  input.value = '';
  input.style.height = 'auto';
  document.getElementById('sendBtn').disabled = true;

  addMsg(text, true);
  history.push({ role:'user', content:text });
  addLoading();
  setBubble('等我一下。');

  try {
    const base = apiUrl.replace(/\/+$/,'');
    const res = await fetch(base+'/messages', {
      method: 'POST',
      headers: {
        'Content-Type':'application/json',
        'x-api-key': apiKey,
        'Authorization': 'Bearer '+apiKey,
        'anthropic-version':'2023-06-01'
      },
      body: JSON.stringify({
        model: model,
        max_tokens: 1024,
        system: systemPrompt,
        messages: history
      })
    });

    const data = await res.json();
    removeLoading();

    if(data.error) {
      addMsg('出错了：'+data.error.message, false);
      history.pop();
      setBubble('出了点问题，再试试？');
    } else {
      const reply = data.content[0].text;
      history.push({ role:'assistant', content:reply });
      addMsg(reply, false);
      setBubble('嗯。');
    }
  } catch(e) {
    removeLoading();
    addMsg('网络错误，请检查后重试', false);
    history.pop();
    setBubble('网络好像有问题，再试试？');
  }

  document.getElementById('sendBtn').disabled = false;
}

document.getElementById('chatInput').addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 90)+'px';
});
</script>
